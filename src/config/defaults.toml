#
# Homebrew — shellenv initialization
#
# Split by OS because the convention differs:
#   macOS zsh → .zprofile (login shells)
#   Linux zsh → .zshrc    (interactive shells)
# Bash emits the same shellenv line on both OSes; duplicated here since only
# one of the two pkgs is active on any given host (`supported_os` gates it).
#

[pkg.brew-macos]
enable = "detect"
supported_os = ["macos"]
description = "Homebrew shellenv initialization (macOS convention: login profile)."

[pkg.brew-macos.install_hint.brew]
packages = []

[[pkg.brew-macos.detect]]
type = "file"
path = "${brew_prefix}/bin/brew"

[[pkg.brew-macos.shell.env_init.bash]]
type = "comment"
text = "Homebrew environment (PATH, MANPATH, INFOPATH)"

[[pkg.brew-macos.shell.env_init.bash]]
type = "eval_output"
command = ["${brew_prefix}/bin/brew", "shellenv", "bash"]

[[pkg.brew-macos.shell.login_init.zsh]]
type = "comment"
text = "Homebrew environment (PATH, MANPATH, INFOPATH, fpath)"

[[pkg.brew-macos.shell.login_init.zsh]]
type = "eval_output"
command = ["${brew_prefix}/bin/brew", "shellenv", "zsh"]

[pkg.brew-linux]
enable = "detect"
supported_os = ["linux"]
description = "Homebrew shellenv initialization (Linux convention: interactive shells)."

[pkg.brew-linux.install_hint.brew]
packages = []

[[pkg.brew-linux.detect]]
type = "file"
path = "${brew_prefix}/bin/brew"

[[pkg.brew-linux.shell.env_init.bash]]
type = "comment"
text = "Homebrew environment (PATH, MANPATH, INFOPATH)"

[[pkg.brew-linux.shell.env_init.bash]]
type = "eval_output"
command = ["${brew_prefix}/bin/brew", "shellenv", "bash"]

[[pkg.brew-linux.shell.interactive_init.zsh]]
type = "comment"
text = "Homebrew environment (PATH, MANPATH, INFOPATH, fpath)"

[[pkg.brew-linux.shell.interactive_init.zsh]]
type = "eval_output"
command = ["${brew_prefix}/bin/brew", "shellenv", "zsh"]

#
# Bash login → .bashrc chain
#

[pkg.bashrc-chain]
enable = "on"
description = "Chain ~/.bashrc from the login profile so login shells inherit interactive config."

[pkg.bashrc-chain.install_hint.brew]
packages = []

[[pkg.bashrc-chain.shell.login_init.bash]]
type = "line"
line = "[ -f ~/.bashrc ] && source ~/.bashrc"

#
# Always-on PATH additions
#

[pkg.local-bin]
enable = "on"
description = "Append ~/.local/bin to PATH."

[pkg.local-bin.install_hint.brew]
packages = []

[[pkg.local-bin.shell.env_init.bash]]
type = "comment"
text = "Local user binaries"

[[pkg.local-bin.shell.env_init.bash]]
type = "path_append"
value = "~/.local/bin"

[[pkg.local-bin.shell.env_init.zsh]]
type = "comment"
text = "Local user binaries"

[[pkg.local-bin.shell.env_init.zsh]]
type = "path_append"
value = "~/.local/bin"

#
# Homebrew Python — PATH append for brew-installed python
#

[pkg.brew-python]
enable = "detect"
description = "Homebrew Python — prepends libexec/bin to PATH so `python` resolves to the brew copy."

[pkg.brew-python.install_hint.brew]
packages = ["python"]

[[pkg.brew-python.detect]]
type = "file"
path = "${brew_prefix}/opt/python"

[[pkg.brew-python.shell.env_init.bash]]
type = "comment"
text = "Homebrew Python (brew-managed)"

[[pkg.brew-python.shell.env_init.bash]]
type = "path_append"
value = "${brew_prefix}/opt/python/libexec/bin"

[[pkg.brew-python.shell.env_init.zsh]]
type = "comment"
text = "Homebrew Python (brew-managed)"

[[pkg.brew-python.shell.env_init.zsh]]
type = "path_append"
value = "${brew_prefix}/opt/python/libexec/bin"

[pkg.cargo]
enable = "detect"
description = "Rust toolchain (cargo) — loads ~/.cargo/env into the shell."

[pkg.cargo.install_hint.brew]
packages = ["rustup-init"]

[[pkg.cargo.detect]]
type = "file"
path = "~/.cargo/env"

[[pkg.cargo.shell.env_init.bash]]
type = "comment"
text = "Rust/Cargo environment"

[[pkg.cargo.shell.env_init.bash]]
type = "source"
path = "~/.cargo/env"

[[pkg.cargo.shell.env_init.zsh]]
type = "comment"
text = "Rust/Cargo environment"

[[pkg.cargo.shell.env_init.zsh]]
type = "source"
path = "~/.cargo/env"

#
# bash-completion (brew)
#

[pkg.bash-completion]
enable = "detect"
description = "Brew-managed bash completion loader."

[pkg.bash-completion.install_hint.brew]
packages = ["bash-completion@2"]

[[pkg.bash-completion.detect]]
type = "file"
path = "${brew_prefix}/etc/bash_completion"

[[pkg.bash-completion.shell.interactive_init.bash]]
type = "comment"
text = "Bash completions (brew-managed)"

[[pkg.bash-completion.shell.interactive_init.bash]]
type = "source"
path = "${brew_prefix}/etc/bash_completion"

#
# Zsh completions
#

[pkg.zsh-completions]
enable = "on"
description = "Zsh completion system initialization (compinit)."

[pkg.zsh-completions.install_hint.brew]
packages = []

[[pkg.zsh-completions.shell.interactive_init.zsh]]
type = "comment"
text = "Initialize Zsh completions"

[[pkg.zsh-completions.shell.interactive_init.zsh]]
type = "line"
line = "autoload -Uz compinit && compinit"

#
# skim fuzzy finder (sk)
#

[pkg.sk]
enable = "detect"
description = "skim (sk) — fuzzy finder used by interactive shell keybindings."

[pkg.sk.install_hint.brew]
packages = ["sk"]

[[pkg.sk.detect]]
type = "file"
path = "~/.cargo/bin/sk"

[[pkg.sk.detect]]
type = "file"
path = "/opt/homebrew/bin/sk"

[[pkg.sk.detect]]
type = "file"
path = "/usr/local/bin/sk"

[[pkg.sk.detect]]
type = "which"
binary = "sk"

[[pkg.sk.shell.interactive_init.bash]]
type = "comment"
text = "Setup sk (fuzzy find)"

[[pkg.sk.shell.interactive_init.bash]]
type = "export"
optional = true
name = "SKIM_DEFAULT_COMMAND"
value = "${skim_default_command}"

[[pkg.sk.shell.interactive_init.bash]]
type = "source_output"
command = ["sk", "--shell", "bash"]

[[pkg.sk.shell.interactive_init.bash]]
type = "source_output"
command = ["sk", "--shell", "bash", "--shell-bindings"]

[[pkg.sk.shell.interactive_init.zsh]]
type = "comment"
text = "Setup sk (fuzzy find)"

[[pkg.sk.shell.interactive_init.zsh]]
type = "export"
optional = true
name = "SKIM_DEFAULT_COMMAND"
value = "${skim_default_command}"

[[pkg.sk.shell.interactive_init.zsh]]
type = "source_output"
command = ["sk", "--shell", "zsh"]

[[pkg.sk.shell.interactive_init.zsh]]
type = "source_output"
command = ["sk", "--shell", "zsh", "--shell-bindings"]

#
# starship (fancy prompt)
#

[pkg.starship]
enable = "detect"
description = "starship — cross-shell prompt."

[pkg.starship.install_hint.brew]
packages = ["starship"]

[[pkg.starship.detect]]
type = "file"
path = "~/.cargo/bin/starship"

[[pkg.starship.detect]]
type = "which"
binary = "starship"

[[pkg.starship.shell.interactive_init.bash]]
type = "comment"
text = "Setup starship (fancy prompt)"

[[pkg.starship.shell.interactive_init.bash]]
type = "eval_output"
command = ["starship", "init", "bash"]

[[pkg.starship.shell.interactive_init.zsh]]
type = "comment"
text = "Setup starship (fancy prompt)"

[[pkg.starship.shell.interactive_init.zsh]]
type = "eval_output"
command = ["starship", "init", "zsh"]

#
# zenops CLI completions
#

[pkg.zenops]
enable = "on"
description = "zenops itself — shell completions for the zenops CLI."

[pkg.zenops.install_hint.brew]
packages = []

[[pkg.zenops.shell.interactive_init.bash]]
type = "comment"
text = "zenops shell completions"

[[pkg.zenops.shell.interactive_init.bash]]
type = "source_output"
command = ["zenops", "completions", "bash"]

[[pkg.zenops.shell.interactive_init.zsh]]
type = "comment"
text = "zenops shell completions"

[[pkg.zenops.shell.interactive_init.zsh]]
type = "source_output"
command = ["zenops", "completions", "zsh"]

#
# LLVM toolchain (brew)
#

[pkg.llvm]
enable = "detect"
description = "LLVM toolchain (brew) — exports LDFLAGS/CPPFLAGS for compilers."

[pkg.llvm.install_hint.brew]
packages = ["llvm"]

[[pkg.llvm.detect]]
type = "file"
path = "${brew_prefix}/opt/llvm"

[[pkg.llvm.shell.env_init.bash]]
type = "comment"
text = "LLVM compiler flags (brew-managed)"

[[pkg.llvm.shell.env_init.bash]]
type = "export"
name = "LDFLAGS"
value = "-L${brew_prefix}/opt/llvm/lib"

[[pkg.llvm.shell.env_init.bash]]
type = "export"
name = "CPPFLAGS"
value = "-L${brew_prefix}/opt/llvm/include"

[[pkg.llvm.shell.env_init.bash]]
type = "path_prepend"
value = "${brew_prefix}/opt/llvm/bin"

[[pkg.llvm.shell.env_init.zsh]]
type = "comment"
text = "LLVM compiler flags (brew-managed)"

[[pkg.llvm.shell.env_init.zsh]]
type = "export"
name = "LDFLAGS"
value = "-L${brew_prefix}/opt/llvm/lib"

[[pkg.llvm.shell.env_init.zsh]]
type = "export"
name = "CPPFLAGS"
value = "-L${brew_prefix}/opt/llvm/include"

[[pkg.llvm.shell.env_init.zsh]]
type = "path_prepend"
value = "${brew_prefix}/opt/llvm/bin"
